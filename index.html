<html lang="tr">
<head>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<style>
:root{--gold:#C9A227;--gold-lt:#F0C844;--gold-dim:rgba(201,162,39,.14);--gold-b:rgba(201,162,39,.30);--dark:#090e15;--dark2:#101720;--dark3:#19222f;--text:#ede9e0;--muted:rgba(237,233,224,.55);--dim:rgba(237,233,224,.28);--border:rgba(237,233,224,.07);--border-md:rgba(237,233,224,.13);--green:#1a9e74;--green-dim:rgba(26,158,116,.14);--green-b:rgba(26,158,116,.35);--amber:#c97f0a;--amber-dim:rgba(201,127,10,.13);--amber-b:rgba(201,127,10,.35);--rad:16px;--rad-s:10px}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:'DM Sans',sans-serif;background:var(--dark);color:var(--text);min-height:100vh;line-height:1.6;-webkit-font-smoothing:antialiased}
body::before{content:'';position:fixed;inset:0;pointer-events:none;background:radial-gradient(ellipse 80% 50% at 50% -5%,rgba(201,162,39,.07),transparent)}
.wrap{position:relative;z-index:1;max-width:700px;margin:0 auto;padding:0 22px 100px}
.eyebrow{display:inline-flex;align-items:center;gap:10px;font-size:11px;font-weight:500;letter-spacing:2.5px;text-transform:uppercase;color:var(--gold)}
.eyebrow::before,.eyebrow::after{content:'';display:block;width:24px;height:.5px;background:var(--gold);opacity:.5}
.hero{padding:68px 0 52px;text-align:center}
.hero h1{font-family:'Cormorant Garamond',serif;font-size:clamp(36px,8vw,62px);font-weight:300;line-height:1.06;color:var(--text);margin:22px 0 8px}
.hero h1 em{font-style:italic;color:var(--gold-lt)}
.hero-sub{font-family:'Cormorant Garamond',serif;font-size:clamp(16px,3.5vw,21px);font-weight:300;font-style:italic;color:var(--muted);margin-bottom:36px;line-height:1.5}
.hero-stats{display:flex;justify-content:center;gap:36px;flex-wrap:wrap}
.hstat{display:flex;flex-direction:column;align-items:center;gap:3px}
.hstat-val{font-family:'Cormorant Garamond',serif;font-size:26px;font-weight:500;color:var(--gold)}
.hstat-lbl{font-size:10px;color:var(--dim);letter-spacing:1.2px;text-transform:uppercase}
.hero-rule{width:100%;height:.5px;margin-top:48px;background:linear-gradient(90deg,transparent,var(--border-md),transparent)}
.prog-bar{display:flex;align-items:center;gap:14px;padding:13px 20px;background:var(--dark2);border:.5px solid var(--border);border-radius:var(--rad-s);margin-bottom:24px}
.prog-track{flex:1;height:3px;background:var(--border-md);border-radius:2px;overflow:hidden}
.prog-fill{height:100%;background:linear-gradient(90deg,var(--gold),var(--gold-lt));border-radius:2px;transition:width .5s cubic-bezier(.4,0,.2,1)}
.prog-lbl{font-size:11px;color:var(--dim);white-space:nowrap}
.qcard{background:var(--dark2);border:.5px solid var(--border-md);border-radius:var(--rad);padding:36px;margin-bottom:16px;animation:fadeUp .28s ease}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.qcard-meta{display:flex;align-items:center;justify-content:space-between;margin-bottom:22px}
.q-num{font-size:11px;color:var(--dim);letter-spacing:1.5px;text-transform:uppercase}
.q-badge{font-size:10px;font-weight:500;letter-spacing:1px;text-transform:uppercase;padding:3px 11px;border-radius:20px}
.bz{background:rgba(140,100,220,.12);color:#a985e8;border:.5px solid rgba(140,100,220,.25)}
.br{background:rgba(216,100,50,.12);color:#d98060;border:.5px solid rgba(216,100,50,.25)}
.bf{background:rgba(29,158,116,.12);color:#2ec49a;border:.5px solid rgba(29,158,116,.25)}
.bv{background:rgba(201,162,39,.12);color:#C9A227;border:.5px solid rgba(201,162,39,.25)}
.q-txt{font-family:'Cormorant Garamond',serif;font-size:clamp(19px,4vw,25px);font-weight:400;line-height:1.42;color:var(--text);margin-bottom:10px}
.q-hint{font-size:13px;color:var(--muted);font-style:italic;font-weight:300;line-height:1.7;margin-bottom:26px;padding-left:13px;border-left:1.5px solid var(--gold-b)}
.q-gap{margin-bottom:26px}
.opts{display:flex;flex-direction:column;gap:9px}
.opt{display:flex;align-items:flex-start;gap:13px;padding:15px 17px;background:transparent;border:.5px solid var(--border-md);border-radius:var(--rad-s);cursor:pointer;text-align:left;width:100%;color:var(--text);transition:all .18s ease}
.opt:hover{background:rgba(201,162,39,.04);border-color:var(--gold-b)}
.opt.sel{background:var(--gold-dim);border-color:rgba(201,162,39,.5)}
.opt.sel .okey{background:var(--gold);color:var(--dark);border-color:var(--gold);font-weight:500}
.opt.sel .otxt{color:var(--text)}
.okey{width:27px;height:27px;min-width:27px;border-radius:50%;border:.5px solid var(--border-md);display:flex;align-items:center;justify-content:center;font-family:'Cormorant Garamond',serif;font-size:13px;color:var(--dim);margin-top:1px;transition:all .18s}
.otxt{font-size:14px;color:var(--muted);line-height:1.58;font-weight:300}
.warn-msg{display:none;font-size:12px;color:#e07060;margin-top:11px;padding-left:3px}
.nav{display:flex;align-items:center;justify-content:space-between;gap:12px}
.nav-hint{font-size:12px;color:var(--dim)}
.btn{padding:11px 26px;border-radius:var(--rad-s);font-size:14px;font-weight:400;cursor:pointer;border:.5px solid var(--border-md);background:transparent;color:var(--muted);font-family:'DM Sans',sans-serif;transition:all .18s}
.btn:hover:not(:disabled){background:rgba(255,255,255,.04);color:var(--text)}
.btn:disabled{opacity:.3;cursor:not-allowed}
.btn-gold{background:var(--gold);color:var(--dark);border-color:var(--gold);font-weight:500}
.btn-gold:hover:not(:disabled){background:var(--gold-lt);border-color:var(--gold-lt);color:var(--dark)}
.reg-card{background:var(--dark2);border:.5px solid var(--border-md);border-radius:var(--rad);padding:44px 40px 40px;text-align:center}
.reg-card h2{font-family:'Cormorant Garamond',serif;font-size:clamp(22px,5vw,32px);font-weight:300;line-height:1.25;color:var(--text);margin:18px 0 10px}
.reg-sub{font-size:14px;color:var(--muted);line-height:1.75;font-weight:300;margin-bottom:34px;max-width:440px;margin-left:auto;margin-right:auto}
.fields{display:flex;flex-direction:column;gap:14px;margin-bottom:6px;text-align:left}
.flbl{display:block;font-size:10px;letter-spacing:1.8px;text-transform:uppercase;color:var(--dim);margin-bottom:7px;font-weight:400}
.freq{color:var(--gold);margin-left:2px}
.fopt{font-size:10px;color:var(--dim);text-transform:none;letter-spacing:0;margin-left:4px}
.finput{width:100%;padding:13px 16px;background:var(--dark3);border:.5px solid var(--border-md);border-radius:var(--rad-s);font-size:15px;color:var(--text);font-family:'DM Sans',sans-serif;font-weight:300;outline:none;transition:border-color .2s}
.finput::placeholder{color:var(--dim)}
.finput:focus{border-color:var(--gold-b)}
.reg-btn{width:100%;padding:15px;margin-top:22px;background:var(--gold);color:var(--dark);border:none;border-radius:var(--rad-s);font-size:15px;font-weight:500;cursor:pointer;font-family:'DM Sans',sans-serif;letter-spacing:.3px;transition:background .2s}
.reg-btn:hover{background:var(--gold-lt)}
.reg-warn{display:none;font-size:12px;color:#e07060;text-align:center;margin-top:12px}
.reg-priv{font-size:11px;color:var(--dim);margin-top:16px;line-height:1.7}
.load-card{background:var(--dark2);border:.5px solid var(--border-md);border-radius:var(--rad);padding:60px 40px;text-align:center}
.load-card h3{font-family:'Cormorant Garamond',serif;font-size:24px;font-weight:300;color:var(--text);margin-bottom:10px}
.load-card p{font-size:13px;color:var(--dim);font-weight:300;margin-bottom:36px}
.dots{display:flex;justify-content:center;gap:9px}
.dot{width:9px;height:9px;border-radius:50%;background:var(--gold);animation:blink 1.3s ease infinite}
.dot:nth-child(2){animation-delay:.43s}
.dot:nth-child(3){animation-delay:.86s}
@keyframes blink{0%,100%{opacity:.15}50%{opacity:1}}
.res-hero{background:var(--dark2);border:.5px solid var(--border-md);border-radius:var(--rad);padding:48px 40px 40px;text-align:center;position:relative;overflow:hidden;margin-bottom:18px}
.res-hero::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--gold),var(--gold-lt),var(--gold),transparent)}
.sring{width:108px;height:108px;margin:0 auto 24px;position:relative}
.sring svg{transform:rotate(-90deg)}
.snum{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-family:'Cormorant Garamond',serif;font-size:30px;font-weight:400;color:var(--gold-lt)}
.res-badge{display:inline-block;font-size:10px;font-weight:500;letter-spacing:2px;text-transform:uppercase;padding:4px 16px;border-radius:20px;margin-bottom:16px}
.res-title{font-family:'Cormorant Garamond',serif;font-size:clamp(21px,5vw,32px);font-weight:400;color:var(--text);line-height:1.2;margin-bottom:8px}
.res-tag{font-size:14px;color:var(--muted);font-weight:300}
.rontgen{background:var(--dark2);border:.5px solid var(--border-md);border-radius:var(--rad);padding:36px 40px;margin-bottom:18px}
.rontgen-h{font-family:'Cormorant Garamond',serif;font-size:20px;font-weight:400;color:var(--text);margin-bottom:4px}
.rontgen-s{font-size:13px;color:var(--dim);font-weight:300;margin-bottom:30px}
.cat-row{margin-bottom:22px}
.cat-row:last-child{margin-bottom:0}
.cat-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.cat-name{font-size:13px;font-weight:500;color:var(--text)}
.cat-pct{font-size:13px;font-weight:500;color:var(--gold)}
.cat-track{height:5px;background:var(--border-md);border-radius:3px;overflow:hidden;margin-bottom:9px}
.cat-fill{height:100%;border-radius:3px;width:0%;transition:width 1.1s cubic-bezier(.4,0,.2,1)}
.fz{background:linear-gradient(90deg,#7b58c8,#a985e8)}
.fr{background:linear-gradient(90deg,#c05a28,#d98060)}
.ff{background:linear-gradient(90deg,#128f60,#2ec49a)}
.fv{background:linear-gradient(90deg,#a07d18,#C9A227)}
.cat-fb{font-size:13px;color:var(--muted);line-height:1.65;font-weight:300;padding-left:12px;border-left:1.5px solid var(--border-md)}
.cat-fb.strong{color:var(--text);border-left-color:var(--gold-b)}
.cat-fb.weak{color:#d49070;border-left-color:rgba(192,90,40,.4)}
.cta-panel{border:.5px solid var(--border-md);border-radius:var(--rad);overflow:hidden;margin-bottom:18px}
.cta-top{padding:32px 36px 28px;position:relative}
.cta-top::before{content:'';position:absolute;top:0;left:0;right:0;height:2px}
.cta-a .cta-top{background:linear-gradient(135deg,#0e1f18,#0d1c25)}
.cta-a .cta-top::before{background:linear-gradient(90deg,transparent,var(--green),transparent)}
.cta-b .cta-top{background:linear-gradient(135deg,#1a1508,#1a1205)}
.cta-b .cta-top::before{background:linear-gradient(90deg,transparent,var(--amber),transparent)}
.cta-icon{font-size:28px;margin-bottom:14px}
.cta-title{font-family:'Cormorant Garamond',serif;font-size:clamp(20px,4vw,27px);font-weight:400;line-height:1.25;margin-bottom:10px}
.cta-a .cta-title{color:#a8f0d4}
.cta-b .cta-title{color:#f0d490}
.cta-desc{font-size:14px;line-height:1.75;font-weight:300}
.cta-a .cta-desc{color:rgba(168,240,212,.65)}
.cta-b .cta-desc{color:rgba(240,212,144,.6)}
.cta-foot{padding:22px 36px;background:var(--dark2)}
.cta-btn{display:block;width:100%;padding:15px;border:none;border-radius:var(--rad-s);font-size:15px;font-weight:500;cursor:pointer;font-family:'DM Sans',sans-serif;letter-spacing:.3px;text-align:center;text-decoration:none;transition:all .2s;margin-bottom:10px}
.cta-btn-a{background:var(--green);color:#fff}
.cta-btn-a:hover{background:#14855f}
.cta-btn-b{background:var(--amber);color:#fff}
.cta-btn-b:hover{background:#a86808}
.cta-note{font-size:12px;color:var(--dim);line-height:1.7;text-align:center}
.footer{text-align:center;padding-top:52px;font-size:12px;color:var(--dim);font-weight:300}
@media(max-width:500px){.qcard,.reg-card,.load-card,.res-hero,.rontgen{padding-left:22px;padding-right:22px}.cta-top,.cta-foot{padding-left:22px;padding-right:22px}.hero{padding:48px 0 36px}.hero-stats{gap:22px}.btn{padding:10px 18px;font-size:13px}}
</style>
</head>
<body>
<div class="wrap">

  groupA: { zihniyet: 75, finansal: 75 },

  fillCls: { zihniyet:'fz', risk:'fr', finansal:'ff', vizyon:'fv' },

/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
   SORULAR
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
const Q = [
  {id:1,cat:'zihniyet',txt:'Bu hafta başkasının hedefleri için kaç saat çalıştınız?',hint:'Toplantılar, mesailer, beklenmedik görevler dahil — dürüstçe düşünün.',opts:[{t:'40 saatten fazla. Hayatımın büyük bölümü böyle geçiyor.',s:5},{t:'30–40 saat arası. Standart, itiraz etmiyorum.',s:3},{t:'Değişiyor — ama çoğu zaman fazla hissettiriyor.',s:4},{t:'Zaten bağımsız çalışıyorum; bu döngünün dışındayım.',s:2}]},
  {id:2,cat:'zihniyet',txt:'Son 5 yılda maaşınız gerçek hayat pahalılığıyla yarıştı mı?',hint:"TL'nin erimesini, kira artışını ve alım gücünüzü hesaba katın.",opts:[{t:'Hayır. Rakamlara bakınca satın alma gücüm geriledi.',s:5},{t:'Neredeyse. Ama bir türlü "ileri" gidemiyorum.',s:4},{t:'Zamlar oldu; yeterli mi gerçekten bilmiyorum.',s:3},{t:'Evet, maaşımdan memnunum.',s:1}]},
  {id:3,cat:'zihniyet',txt:'Çevrenizde ortalamanın çok üstünde kazanan birini gördüğünüzde ilk tepkiniz ne olur?',hint:null,opts:[{t:'"Ben de yapabilirim." — Bunu gerçekten hissediyorum.',s:5},{t:'Sessizce inceliyorum; ne yaptığını anlamaya çalışıyorum.',s:5},{t:'"Şansı varmış ya da birisi kapıyı açmış."',s:1},{t:'"İyi ona, ama benim şartlarım farklı."',s:1}]},
  {id:4,cat:'risk',txt:'Konfor alanınızdan çıkmanızı gerektiren bir fırsatla karşılaştığınızda ne yaparsınız?',hint:null,opts:[{t:'Heyecanlanır ve hemen araştırmaya başlarım.',s:5},{t:'İlgi duyarım ama "hazır olunca" derim ve beklerim.',s:3},{t:'Temkinli yaklaşır, başkalarının onayını ararım.',s:2},{t:'İstikrar benim için her şeyden değerli.',s:1}]},
  {id:5,cat:'risk',txt:'Önümüzdeki 3 ayda maaşınız kesilse, alternatif bir geliriniz var mıydı?',hint:null,opts:[{t:'Hayır. Bu soruyu okumak bile içimi sıktı.',s:5},{t:'Çok az. 1–2 ay idare ederim, sonrası karanlık.',s:4},{t:'Birikimim var, bir süre dayanabilirim.',s:3},{t:'Evet. Zaten pasif gelir kanallarım mevcut.',s:1}]},
  {id:6,cat:'risk',txt:'Hayatınızda "bunu bir gün yapacağım" dediğiniz kaç ertelenmiş hayaliniz var?',hint:null,opts:[{t:'Birden fazla. Zamanım olunca, emekli olunca...',s:5},{t:'Var, ama gerçekçi olmadıklarını düşünüyorum.',s:4},{t:'Bir iki tane var — ama önce istikrar şart.',s:3},{t:'Şimdiki hayatımdan gerçekten memnunum.',s:1}]},
  {id:7,cat:'finansal',txt:'30.000 TL ile kanıtlanmış bir iş modeline yatırım yapmanız gerekse ilk duygunuz ne olur?',hint:'Parayı bulmaktan değil, onu yatırıma çevirmekten söz ediyoruz.',opts:[{t:'Heyecan. Doğru sistemi görsem hemen değerlendiririm.',s:5},{t:'Temkinli. Önce her detayı iyice öğrenmek isterim.',s:4},{t:'Kaygılı. Kayıp ihtimali beni bloke eder.',s:2},{t:'İlgilenmezdim. Para bu tür riske giremez.',s:1}]},
  {id:8,cat:'finansal',txt:"50.000 TL'yi 3 yılda 5 katına çıkaracak bir sisteme kavuşsanız, bu sermayeyi bugün organize edebilir miydiniz?",hint:'Birikim, kredi, aile desteği — her yolu düşünerek cevap verin.',opts:[{t:'Evet. Bir yolunu bulur, organize ederdim.',s:5},{t:'Belki. 3–6 ay içinde toplayabilirdim.',s:4},{t:'Zor, ama imkânsız da değil.',s:2},{t:'Hayır. Şu an bu esnekliğim kesinlikle yok.',s:1}]},
  {id:9,cat:'finansal',txt:'Hangi başlangıç sermaye bandı size en gerçekçi geliyor?',hint:'Bu bir ön eleme kriteridir — dürüstçe işaretleyin.',opts:[{t:'50.000 TL ve üzeri — En hızlı başlamak, tam gaz girmek istiyorum.',s:5},{t:'40.000 TL — Hızlı ama ölçülü; orta tempo bana uygun.',s:4},{t:'30.000 TL — Temkinli başlayıp adım adım büyütmek istiyorum.',s:3},{t:'Bu rakamlar şu an için çok yüksek.',s:1}]},
  {id:10,cat:'vizyon',txt:'Şu an yaşadığınız hayat, 10 yıl önce hayal ettiğiniz hayat mı?',hint:null,opts:[{t:'Hayır. O hayal çok daha büyük ve farklıydı.',s:5},{t:'Kısmen. Bazı şeyler tuttu, bazıları hiç gerçekleşmedi.',s:4},{t:'Tam değil ama yakın; yavaş da olsa ilerliyor.',s:2},{t:'Evet. İstediğim hayatı yaşıyorum.',s:1}]},
  {id:11,cat:'vizyon',txt:'Yeni nesil iş modellerini (dijital ürünler, pasif gelir, platform ekonomisi) takip ediyor musunuz?',hint:null,opts:[{t:'Aktif takip ediyorum; birkaç alanda denemeler yaptım.',s:5},{t:'Genel hatlarıyla biliyorum ama henüz adım atmadım.',s:4},{t:'Duyuyorum ama çoğunu anlamak için zamanım olmadı.',s:2},{t:'Bu konuları çok takip etmiyorum.',s:1}]},
  {id:12,cat:'vizyon',txt:'Bu soruları yanıtlarken içinizde gerçekte ne hissettiniz?',hint:'Dürüstçe.',opts:[{t:'Rahatsız oldum. Bazı gerçekleri görmezden geliyordum.',s:5},{t:'Düşündürücüydü. Bazı sorular gerçekten isabet etti.',s:4},{t:'Nötr. Bunların zaten farkındaydım.',s:2},{t:'Hiçbir şey hissetmedim; beni pek etkilemedi.',s:1}]},
];

/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
   GERİ BİLDİRİM METİNLERİ
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
const FB = {
  zihniyet:{strong:'Sistemin gerçeğini görüyorsunuz. Bu farkındalık, dönüşümün ilk ve en kritik adımıdır.',mid:'Zihinsel kıpırdanma başlamış — ama henüz tam uyanmadınız. Doğru tetikleyici sizi değiştirebilir.',weak:'Altın kafes konfordur, özgürlük değil. Zihinsel kölelik en sessiz ve en tehlikeli olanıdır.'},
  risk:{strong:'Belirsizlikle barışıksınız. Bu, girişimciliğin en nadir bulunan ve en değerli özelliğidir.',mid:'Harekete geçme isteği var, ama ayağınızı yerden kesmekte zorlanıyorsunuz. Zamanla değil, kararla değişir.',weak:'Risk almamak da bir risktir — ve bu risk size her geçen gün sessizce fatura kesiyor.'},
  finansal:{strong:'Sermaye kapasitesi mevcut. Doğru sistemi gördüğünüzde harekete geçme potansiyeliniz var.',mid:'Finansal hazırlığınız orta düzeyde; başlamak için kenar çizgisindesiniz. Küçük adımlar mesafeyi kapatır.',weak:'Sermayesiz adım atmak zorunda değilsiniz — ama önce bu engeli yıkmanız şart.'},
  vizyon:{strong:'Geleceği okuyorsunuz. Bu okuma hızı, rakiplerinize karşı en büyük avantajınızdır.',mid:'Vizyonunuz var ama henüz somut bir yol haritasına oturmamış. Fikir değer, uygulama değer üretir.',weak:'Yeni dünyayı okumadan eski haritayla yürümek sizi kaçınılmaz olarak kaybolmaya götürür.'},
};

/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
   STATE
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
let S={user:{name:'',email:'',phone:''},answers:{},cursor:0};

/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
   SCORING
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
function calcScore(){
  const cats=Object.keys(CFG.labels),raw={};
  cats.forEach(c=>raw[c]={s:0,mx:0});
  Q.forEach(q=>{
    const mx=Math.max(...q.opts.map(o=>o.s));
    raw[q.cat].mx+=mx;
    if(S.answers[q.id]!==undefined) raw[q.cat].s+=q.opts[S.answers[q.id]].s;
  });
  const pct={};
  cats.forEach(c=>{pct[c]=raw[c].mx>0?Math.round((raw[c].s/raw[c].mx)*100):0;});
  let wS=0,wM=0;
  cats.forEach(c=>{const w=CFG.weights[c]||1;wS+=raw[c].s*w;wM+=raw[c].mx*w;});
  return{pct,general:wM>0?Math.round((wS/wM)*100):0};
}
function isA(pct){return pct.zihniyet>=CFG.groupA.zihniyet&&pct.finansal>=CFG.groupA.finansal;}
function fbLv(p){return p>=72?'strong':p>=45?'mid':'weak';}

/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
   HELPERS
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
const el=id=>document.getElementById(id);
const set=html=>el('stage').innerHTML=html;
function progUp(){
  const d=Object.keys(S.answers).length,p=Math.round((d/Q.length)*100);
  el('prog-fill').style.width=p+'%';
  el('prog-lbl').textContent=d+' / '+Q.length;
}

/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
   REGISTER
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
function renderReg(){
  el('prog-bar').style.display='none';
  set(`<div class="reg-card">
    <div class="eyebrow" style="justify-content:center">Başlamadan Önce</div>
    <h2>Kendinize karşı<br>dürüst olabilecek misiniz?</h2>
    <p class="reg-sub">Bu test puanlamak için değil, <em>ayna tutmak</em> için tasarlandı.<br>12 soru &middot; 4 boyut &middot; yaklaşık 6 dakika.</p>
    <div class="fields">
      <div><label class="flbl">Ad Soyad <span class="freq">*</span></label><input id="rn" class="finput" type="text" placeholder="Adınız ve soyadınız" autocomplete="name"></div>
      <div><label class="flbl">E-posta <span class="freq">*</span></label><input id="re" class="finput" type="email" placeholder="ornek@mail.com" autocomplete="email"></div>
      <div><label class="flbl">Telefon <span class="fopt">(opsiyonel)</span></label><input id="rp" class="finput" type="tel" placeholder="+90 5xx xxx xx xx" autocomplete="tel"></div>
    </div>
    <div id="rwarn" class="reg-warn">Ad soyad ve e-posta zorunludur.</div>
    <button class="reg-btn" onclick="doReg()">Testi Başlat &rarr;</button>
    <p class="reg-priv">Bilgileriniz yalnızca değerlendirme amacıyla kullanılır ve üçüncü taraflarla paylaşılmaz.</p>
  </div>`);
}

function doReg(){
  const name=el('rn').value.trim(),email=el('re').value.trim(),phone=el('rp').value.trim();
  if(!name||!email){el('rwarn').style.display='block';return;}
  S.user={name,email,phone};
  postForm({_subject:`Yeni Kayıt | ${name} | Test Başlatıldı`,ad_soyad:name,email,telefon:phone||'Belirtilmedi',tarih:new Date().toLocaleString('tr-TR'),durum:'Test başlatıldı'});
  el('prog-bar').style.display='flex';
  S.cursor=0;
  renderQ();
}

/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
   TEST
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
function renderQ(){
  progUp();
  if(S.cursor>=Q.length){renderLoad();return;}
  const q=Q[S.cursor],sel=S.answers[q.id],last=S.cursor===Q.length-1;
  set(`<div class="qcard">
    <div class="qcard-meta">
      <span class="q-num">Soru ${S.cursor+1} / ${Q.length}</span>
      <span class="q-badge ${CFG.badge[q.cat]}">${CFG.labels[q.cat]}</span>
    </div>
    <div class="q-txt">${q.txt}</div>
    ${q.hint?`<div class="q-hint">${q.hint}</div>`:'<div class="q-gap"></div>'}
    <div class="opts">${q.opts.map((o,i)=>`
      <button class="opt ${sel===i?'sel':''}" onclick="pick(${i})">
        <span class="okey">${String.fromCharCode(65+i)}</span>
        <span class="otxt">${o.t}</span>
      </button>`).join('')}
    </div>
    <div class="warn-msg" id="wmsg">Lütfen bir seçenek işaretleyin.</div>
  </div>
  <div class="nav">
    <button class="btn" onclick="mv(-1)" ${S.cursor===0?'disabled':''}>&#8592; Geri</button>
    <span class="nav-hint">${Object.keys(S.answers).length} tamamlandı</span>
    <button class="btn btn-gold" onclick="mv(1)">${last?'Sonuçları Gör':'İleri &#8594;'}</button>
  </div>`);
}

function pick(i){S.answers[Q[S.cursor].id]=i;renderQ();}
function mv(d){
  if(d===1&&S.answers[Q[S.cursor].id]===undefined){const w=el('wmsg');if(w)w.style.display='block';return;}
  S.cursor=Math.max(0,Math.min(Q.length,S.cursor+d));renderQ();
}

/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
   LOADING
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
function renderLoad(){
  el('prog-bar').style.display='none';
  set(`<div class="load-card">
    <div class="eyebrow" style="justify-content:center;margin-bottom:20px">Analiz Yapılıyor</div>
    <h3>Röntgeniniz hazırlanıyor...</h3>
    <p>4 boyut ayrı ayrı değerlendiriliyor.</p>
    <div class="dots"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>
  </div>`);
  window.scrollTo({top:0,behavior:'smooth'});
  setTimeout(sendAndShow,1500);
}

/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
   SEND + RESULT
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
async function sendAndShow(){
  const {pct,general}=calcScore();
  const groupA=isA(pct);
  const {name,email,phone}=S.user;
  const now=new Date().toLocaleString('tr-TR');
  const detay=Q.map((q,i)=>{const idx=S.answers[q.id];return `S${i+1} [${CFG.labels[q.cat]}]: ${q.txt}\n   -> ${idx!==undefined?q.opts[idx].t:'(Yanıtlanmadı)'} (${idx!==undefined?q.opts[idx].s:0}p)`;}).join('\n\n');
  await postForm({_subject:`Yeni Aday | ${name} | %${general} | ${groupA?'A GRUBU':'B GRUBU'}`,ad_soyad:name,email,telefon:phone||'Belirtilmedi',tarih:now,genel_puan:`%${general}`,grup:groupA?'A Grubu':'B Grubu',zihniyet:`%${pct.zihniyet}`,risk:`%${pct.risk}`,finansal:`%${pct.finansal}`,vizyon:`%${pct.vizyon}`,detayli_cevaplar:detay});
  renderResult(pct,general,groupA,name);
}

function renderResult(pct,general,groupA,name){
  const cats=Object.keys(CFG.labels);
  const circ=2*Math.PI*46,off=(circ-(circ*general/100)).toFixed(1);
  const rows=cats.map(c=>{
    const lv=fbLv(pct[c]),cls=lv==='strong'?'strong':lv==='weak'?'weak':'';
    return `<div class="cat-row">
      <div class="cat-head"><span class="cat-name">${CFG.labels[c]}</span><span class="cat-pct">%${pct[c]}</span></div>
      <div class="cat-track"><div class="cat-fill ${CFG.fillCls[c]}" id="cf-${c}" style="width:0%"></div></div>
      <div class="cat-fb ${cls}">${FB[c][lv]}</div>
    </div>`;
  }).join('');
  const fn=name.split(' ')[0];
  const badge=groupA?'background:var(--green-dim);color:#2ec49a;border:.5px solid var(--green-b)':'background:var(--amber-dim);color:#e0a030;border:.5px solid var(--amber-b)';
  const cta=groupA?`<div class="cta-panel cta-a">
    <div class="cta-top">
      <div class="cta-icon">&#9672;</div>
      <div class="cta-title">Liderlerin Arasına<br>Hoş Geldiniz, ${fn}.</div>
      <p class="cta-desc">Zihniyet ve finansal hazırlık boyutlarınız kritik eşiğin üzerinde. Bu, çoğu insanın asla ulaşamadığı bir netliği taşıdığınızı gösteriyor. Sistemi, yol haritasını ve ekibi yakından tanımanın tam zamanı.</p>
    </div>
    <div class="cta-foot">
      <a class="cta-btn cta-btn-a" href="${CFG.whatsapp}" target="_blank" rel="noopener">WhatsApp Grubuna Katıl &rarr;</a>
      <p class="cta-note">Kontenjan sınırlıdır. WhatsApp grubuna katılarak sürecin detaylarını öğrenin.</p>
    </div>
  </div>`:`<div class="cta-panel cta-b">
    <div class="cta-top">
      <div class="cta-icon">&#9671;</div>
      <div class="cta-title">Gerçeklerle Yüzleşme<br>Cesaretin Takdire Şayan.</div>
      <p class="cta-desc">Ancak henüz hazır değilsin. Bazı boyutlarda gelişim gerekiyor — bu bir son değil, bir başlangıç noktası. Labirentin içinden çıkmak için önce haritaya ihtiyacın var.</p>
    </div>
    <div class="cta-foot">
      <a class="cta-btn cta-btn-b" href="${CFG.bulletinUrl}" target="_blank" rel="noopener">Isındırma Serisine Kaydol — Labirentten Çıkış Bülteni &rarr;</a>
      <p class="cta-note">Ücretsiz bülten. Hazır hissettiğinde testi yeni bakış açınla yeniden yapabilirsin.</p>
    </div>
  </div>`;
  set(`<div class="res-hero">
    <div class="sring">
      <svg width="108" height="108" viewBox="0 0 108 108">
        <circle cx="54" cy="54" r="46" fill="none" stroke="rgba(255,255,255,.06)" stroke-width="7"/>
        <circle id="sarc" cx="54" cy="54" r="46" fill="none" stroke="url(#sg)" stroke-width="7" stroke-linecap="round" stroke-dasharray="${circ.toFixed(1)}" stroke-dashoffset="${circ.toFixed(1)}" style="transition:stroke-dashoffset 1.2s cubic-bezier(.4,0,.2,1)"/>
        <defs><linearGradient id="sg" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#C9A227"/><stop offset="100%" stop-color="#F0C844"/></linearGradient></defs>
      </svg>
      <div class="snum">%${general}</div>
    </div>
    <div class="res-badge" style="${badge}">${groupA?'A Grubu — Yüksek Potansiyel':'B Grubu — Gelişim Odaklı'}</div>
    <div class="res-title">Kişisel Girişimcilik Röntgeniniz</div>
    <p class="res-tag">4 boyutlu analiz sonucu &mdash; ${name}</p>
  </div>
  <div class="rontgen">
    <div class="rontgen-h">Boyut Analizi</div>
    <p class="rontgen-s">Her kategori bağımsız olarak değerlendirildi.</p>
    ${rows}
  </div>
  ${cta}`);
  window.scrollTo({top:0,behavior:'smooth'});
  setTimeout(()=>{
    const arc=el('sarc');if(arc)arc.style.strokeDashoffset=off;
    cats.forEach(c=>{const e=el('cf-'+c);if(e)e.style.width=pct[c]+'%';});
  },280);
}

/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
   FORMSPREE
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
async function postForm(data){try{await fetch(CFG.formspree,{method:'POST',headers:{'Content-Type':'application/json','Accept':'application/json'},body:JSON.stringify(data)});}catch(e){}}

/* ━━ BOOT ━━ */
renderReg();
</script>
</body>
</html>
